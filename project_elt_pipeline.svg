<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 240" width="160" height="240">
  <defs>
    <linearGradient id="proj-card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#06080b"/>
    </linearGradient>
    <filter id="border-glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="project-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="156" height="236" rx="8" fill="url(#proj-card-grad)" stroke="#ff7043" stroke-width="1.2" filter="url(#border-glow-orange)"/>
  <text x="15" y="26" font-family="'Outfit', sans-serif" font-weight="700" font-size="8.5" fill="#8b949e" letter-spacing="0.3">DATA ENGINEERING</text>
  <circle cx="145" cy="23" r="3.5" fill="#ff7043"/>
  <g stroke="#ff7043" stroke-width="1.5" fill="none" opacity="0.9">
    <path d="M 20,80 H 70 L 100,120 H 140" stroke-dasharray="2,2"/>
    <path d="M 20,130 H 70 L 100,120" stroke-dasharray="2,2"/>
    <rect x="15" y="65" width="30" height="25" rx="3" fill="#1f2937" stroke="#00d2ff"/>
    <rect x="15" y="115" width="30" height="25" rx="3" fill="#1f2937" stroke="#00d2ff"/>
    <rect x="110" y="105" width="35" height="25" rx="3" fill="#1f2937" stroke="#3fb950"/>
    <text x="30" y="80" font-family="sans-serif" font-size="7" fill="#fff" stroke="none" text-anchor="middle">RAW</text>
    <text x="30" y="130" font-family="sans-serif" font-size="7" fill="#fff" stroke="none" text-anchor="middle">API</text>
    <text x="127" y="121" font-family="sans-serif" font-size="7" fill="#fff" stroke="none" text-anchor="middle">MART</text>
    <circle cx="85" cy="100" r="10" fill="#ff7043" stroke="none" filter="url(#project-glow)"/>
    <text x="85" y="103" font-family="sans-serif" font-weight="bold" font-size="8" fill="#fff" stroke="none" text-anchor="middle">dbt</text>
  </g>
  <text x="15" y="198" font-family="'Outfit', sans-serif" font-size="11.5" font-weight="700" fill="#ffffff">ELT Pipeline using</text>
