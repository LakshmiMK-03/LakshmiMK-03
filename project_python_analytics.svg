      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#06080b"/>
    </linearGradient>
    <filter id="border-glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
